# OfferFlow - Nginx 双环境部署配置
# 服务器部署参考文件（可选）
#
# 使用方式：
#   sudo cp nginx.conf /etc/nginx/sites-available/offerflow
#   sudo ln -s /etc/nginx/sites-available/offerflow /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 前提：
#   - 正式版 Next.js 运行在 :3000（pm2 start npm -- run start:prod）
#   - 测试版 Next.js 运行在 :3001（pm2 start npm -- run start:beta）
#   - 已申请 SSL 证书（推荐 certbot: sudo certbot --nginx）

# ──────────────────────────────────────────
# 正式版：offerflow.com
# ──────────────────────────────────────────
server {
    listen 80;
    server_name offerflow.com www.offerflow.com;

    # HTTP → HTTPS 重定向（申请证书后启用）
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ──────────────────────────────────────────
# 测试版：beta.offerflow.com
# ──────────────────────────────────────────
server {
    listen 80;
    server_name beta.offerflow.com;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

